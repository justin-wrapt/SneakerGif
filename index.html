<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080d">
<title>GIF Reply</title>
<link rel="manifest" href="data:application/json,{}">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080d;--surface:#12121a;--surface2:#1a1a26;--surface3:#22222e;
  --text:#e8e6e3;--text2:#9995a0;--text3:#5c5867;
  --accent:#ff6b6b;--accent2:#ffa36b;--remote:#6b8aff;--remote2:#a36bff;
  --green:#4ade80;--red:#f87171;
  --radius:14px;--radius-sm:8px;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body)}
button{font-family:inherit;border:none;cursor:pointer;outline:none;background:none;color:inherit}
input{font-family:inherit;border:none;outline:none;background:none;color:inherit}

/* ===== HEADER ===== */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:env(safe-area-inset-top,12px) 16px 10px;
  background:linear-gradient(180deg,rgba(8,8,13,.98),rgba(8,8,13,.85));
  backdrop-filter:blur(20px);position:relative;z-index:100;
}
.logo{font-family:var(--font-head);font-weight:800;font-size:18px;letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mode-pills{display:flex;gap:4px}
.mode-pill{
  font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:6px 12px;border-radius:20px;transition:all .2s;
  background:var(--surface2);color:var(--text3);
}
.mode-pill.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 12px rgba(255,107,107,.3)}
.mode-pill.remote-active{background:linear-gradient(135deg,var(--remote),var(--remote2));box-shadow:0 2px 12px rgba(107,138,255,.3)}

/* ===== STATUS BAR ===== */
.status-bar{
  display:flex;align-items:center;gap:8px;padding:6px 16px;
  font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);
  background:var(--surface);border-bottom:1px solid rgba(255,255,255,.04);
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;
  animation:pulse-dot 2s ease infinite}
.status-dot.offline{background:var(--red);animation:none}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}

/* ===== MAIN CONTENT ===== */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px}
.app-wrap{display:flex;flex-direction:column;height:100%;position:relative}

/* ===== PREP MODE ===== */
.search-wrap{position:relative;margin-bottom:14px}
.search-input{
  width:100%;padding:14px 16px 14px 44px;border-radius:var(--radius);
  background:var(--surface2);font-size:16px;color:var(--text);
  border:1px solid transparent;transition:border .2s;
}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px}
.search-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.search-result{
  border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;position:relative;
  aspect-ratio:16/10;background:var(--surface);
  transition:transform .15s,box-shadow .15s;
}
.search-result:active{transform:scale(.95)}
.search-result img{width:100%;height:100%;object-fit:cover}
.search-result .add-badge{
  position:absolute;bottom:6px;right:6px;width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;
}
.search-result:hover .add-badge,.search-result:active .add-badge{opacity:1}

/* ===== CATEGORY TABS ===== */
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;margin-bottom:4px;-ms-overflow-style:none;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  padding:6px 14px;border-radius:20px;white-space:nowrap;flex-shrink:0;
  background:var(--surface2);color:var(--text3);transition:all .2s;
}
.cat-tab.active{background:var(--surface3);color:var(--text)}

/* ===== DECK GRID ===== */
.deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding-bottom:80px}
.deck-card{
  border-radius:var(--radius-sm);overflow:hidden;position:relative;cursor:pointer;
  aspect-ratio:4/3;background:var(--surface);
  transition:transform .12s;
}
.deck-card:active{transform:scale(.93)}
.deck-card img{width:100%;height:100%;object-fit:cover}
.deck-card .card-label{
  position:absolute;bottom:0;left:0;right:0;padding:4px 8px;
  font-family:var(--font-mono);font-size:8px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  background:linear-gradient(transparent,rgba(0,0,0,.8));color:var(--text2);
}
.deck-card .card-delete{
  position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--red);
  opacity:0;transition:opacity .2s;
}
.deck-card:hover .card-delete{opacity:1}

/* ===== CTRL MODE (iPhone remote) ===== */
.ctrl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding-bottom:80px}
.ctrl-card{
  border-radius:var(--radius-sm);overflow:hidden;position:relative;cursor:pointer;
  aspect-ratio:4/3;background:var(--surface);
  border:2px solid transparent;transition:all .15s;
}
.ctrl-card:active{transform:scale(.92);border-color:var(--remote)}
.ctrl-card.sent{border-color:var(--remote);box-shadow:0 0 16px rgba(107,138,255,.3)}
.ctrl-card img{width:100%;height:100%;object-fit:cover}
.ctrl-clear{
  position:fixed;bottom:env(safe-area-inset-bottom,20px);left:50%;transform:translateX(-50%);
  padding:14px 40px;border-radius:40px;
  background:linear-gradient(135deg,var(--remote),var(--remote2));
  font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:#fff;box-shadow:0 4px 20px rgba(107,138,255,.4);z-index:50;
}

/* ===== FULLSCREEN GIF ===== */
.fullscreen{
  position:fixed;inset:0;z-index:200;background:#000;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.fullscreen.visible{opacity:1;pointer-events:auto}
.fullscreen img{max-width:100%;max-height:100%;object-fit:contain}
.fullscreen-close{
  position:absolute;top:env(safe-area-inset-top,16px);right:16px;
  width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;
  backdrop-filter:blur(8px);
}

/* ===== BOTTOM TOOLBAR ===== */
.toolbar{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  padding:10px 16px calc(env(safe-area-inset-bottom,8px) + 10px);
  background:linear-gradient(transparent,var(--bg) 30%);
  display:flex;gap:8px;justify-content:center;
}
.tool-btn{
  padding:10px 18px;border-radius:var(--radius);
  font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  background:var(--surface2);color:var(--text2);transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.tool-btn:active{transform:scale(.95)}
.tool-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}

/* ===== EMPTY STATE ===== */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.6}
.empty-title{font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)}
.empty-sub{font-size:14px;color:var(--text3);line-height:1.5;max-width:280px}

/* ===== TOAST ===== */
.toast{
  position:fixed;top:calc(env(safe-area-inset-top,12px) + 60px);left:50%;transform:translateX(-50%) translateY(-20px);
  padding:10px 20px;border-radius:20px;
  font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:.04em;
  background:var(--surface3);color:var(--text);z-index:300;
  opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;
  border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(12px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{
  background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;
  padding:20px 16px calc(env(safe-area-inset-bottom,8px) + 20px);width:100%;max-width:500px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.3,1);
}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-family:var(--font-head);font-size:18px;font-weight:700;margin-bottom:16px}
.modal-input{
  width:100%;padding:12px 14px;border-radius:var(--radius-sm);
  background:var(--surface2);font-size:15px;color:var(--text);margin-bottom:12px;
  border:1px solid rgba(255,255,255,.06);
}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{
  padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;
  transition:all .2s;
}
.modal-btn.cancel{background:var(--surface2);color:var(--text2)}
.modal-btn.confirm{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}

/* ===== CATEGORY SELECT IN MODAL ===== */
.cat-select{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.cat-opt{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  padding:6px 12px;border-radius:16px;background:var(--surface2);color:var(--text3);
  transition:all .2s;cursor:pointer;
}
.cat-opt.selected{background:var(--accent);color:#fff}

/* ===== ANIMATIONS ===== */
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fade-in .3s ease both}
</style>
</head>
<body>
<div class="app-wrap" id="app">
  <div class="header">
    <div class="logo">GIF REPLY</div>
    <div class="mode-pills">
      <button class="mode-pill active" data-mode="prep">PREP</button>
      <button class="mode-pill" data-mode="live">LIVE</button>
      <button class="mode-pill" data-mode="show">SHOW</button>
      <button class="mode-pill" data-mode="ctrl">CTRL</button>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">DECK: 0 GIFS</span>
    <span style="margin-left:auto" id="modeLabel">PREP MODE</span>
  </div>
  <div class="main" id="mainContent"></div>
  <div class="toolbar" id="toolbar"></div>
</div>

<div class="fullscreen" id="fullscreen">
  <img id="fullscreenImg" src="" alt="">
  <button class="fullscreen-close" id="fullscreenClose">&times;</button>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const GIPHY_KEY = 'dc6zaTOxFJmzC'; // Public beta key
const CATEGORIES = ['all','yes','no','mind-blown','laugh','think','celebrate','cringe','custom'];
const POLL_MS = 600;

let state = {
  mode: 'prep',
  deck: [],
  activeCat: 'all',
  searchResults: [],
  searching: false,
  fullscreenGif: null,
  lastCmd: null,
  pollTimer: null,
};

// === PERSISTENCE ===
function saveDeck() {
  try { localStorage.setItem('gif-deck', JSON.stringify(state.deck)); } catch(e) {}
}
function loadDeck() {
  try {
    const d = localStorage.getItem('gif-deck');
    if (d) state.deck = JSON.parse(d);
  } catch(e) {}
}

// === REMOTE CONTROL ===
function sendCmd(cmd) {
  try { localStorage.setItem('gif-remote-cmd', JSON.stringify({...cmd, ts: Date.now()})); } catch(e) {}
}
function readCmd() {
  try {
    const c = localStorage.getItem('gif-remote-cmd');
    return c ? JSON.parse(c) : null;
  } catch(e) { return null; }
}
function startPolling() {
  stopPolling();
  state.pollTimer = setInterval(() => {
    const cmd = readCmd();
    if (!cmd || cmd.ts === state.lastCmd?.ts) return;
    state.lastCmd = cmd;
    if (cmd.action === 'show' && cmd.gifId) {
      const gif = state.deck.find(g => g.id === cmd.gifId);
      if (gif) showFullscreen(gif.base64 || gif.url);
    } else if (cmd.action === 'clear') {
      hideFullscreen();
    }
  }, POLL_MS);
}
function stopPolling() {
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
}

// === TOAST ===
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// === FULLSCREEN ===
function showFullscreen(src) {
  const el = document.getElementById('fullscreen');
  document.getElementById('fullscreenImg').src = src;
  el.classList.add('visible');
}
function hideFullscreen() {
  document.getElementById('fullscreen').classList.remove('visible');
  document.getElementById('fullscreenImg').src = '';
}

// === GIPHY SEARCH ===
let searchTimeout;
async function searchGiphy(q) {
  if (!q.trim()) { state.searchResults = []; render(); return; }
  state.searching = true; render();
  try {
    const r = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(q)}&limit=24&rating=pg-13`);
    const d = await r.json();
    state.searchResults = (d.data || []).map(g => ({
      id: g.id,
      url: g.images.fixed_width.url,
      preview: g.images.fixed_width_small.url || g.images.fixed_width.url,
      width: parseInt(g.images.fixed_width.width),
      height: parseInt(g.images.fixed_width.height),
      title: g.title,
    }));
  } catch(e) { state.searchResults = []; toast('Search failed'); }
  state.searching = false; render();
}

// === ADD GIF TO DECK ===
async function addToDeck(gif, category = 'custom') {
  if (state.deck.find(g => g.id === gif.id)) { toast('Already in deck'); return; }
  toast('Caching GIF...');
  let base64 = '';
  try {
    const r = await fetch(gif.url);
    const blob = await r.blob();
    base64 = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result);
      reader.onerror = rej;
      reader.readAsDataURL(blob);
    });
  } catch(e) { base64 = ''; }
  state.deck.push({
    id: gif.id, base64, url: gif.url,
    label: gif.title?.split(' ').slice(0,3).join(' ') || 'GIF',
    category, width: gif.width, height: gif.height,
  });
  saveDeck(); toast('Added to deck'); render();
}

function removeFromDeck(id) {
  state.deck = state.deck.filter(g => g.id !== id);
  saveDeck(); render();
}

// === SHOW ADD MODAL ===
function showAddModal(gif) {
  let selectedCat = 'custom';
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modalOverlay');
  const cats = CATEGORIES.filter(c => c !== 'all');
  modal.innerHTML = `
    <div class="modal-title">Add to Deck</div>
    <div style="border-radius:8px;overflow:hidden;margin-bottom:14px;aspect-ratio:16/10;background:var(--surface2)">
      <img src="${gif.preview || gif.url}" style="width:100%;height:100%;object-fit:cover" alt="">
    </div>
    <input class="modal-input" id="gifLabel" placeholder="Label" value="${(gif.title||'').split(' ').slice(0,3).join(' ')}">
    <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">CATEGORY</div>
    <div class="cat-select">${cats.map(c=>`<div class="cat-opt ${c===selectedCat?'selected':''}" data-cat="${c}">${c}</div>`).join('')}</div>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="modalCancel">Cancel</button>
      <button class="modal-btn confirm" id="modalConfirm">Add</button>
    </div>
  `;
  overlay.classList.add('show');
  modal.querySelectorAll('.cat-opt').forEach(el => {
    el.onclick = () => {
      selectedCat = el.dataset.cat;
      modal.querySelectorAll('.cat-opt').forEach(e => e.classList.toggle('selected', e.dataset.cat === selectedCat));
    };
  });
  document.getElementById('modalCancel').onclick = () => overlay.classList.remove('show');
  document.getElementById('modalConfirm').onclick = () => {
    gif.title = document.getElementById('gifLabel').value || gif.title;
    overlay.classList.remove('show');
    addToDeck(gif, selectedCat);
  };
}

// === EXPORT / IMPORT ===
function exportDeck() {
  const data = JSON.stringify(state.deck, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `gif-deck-${Date.now()}.json`;
  a.click();
  toast('Deck exported');
}
function importDeck() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async (e) => {
    try {
      const text = await e.target.files[0].text();
      const imported = JSON.parse(text);
      if (!Array.isArray(imported)) throw new Error('Invalid');
      state.deck = imported;
      saveDeck(); render();
      toast(`Imported ${imported.length} GIFs`);
    } catch(e) { toast('Import failed'); }
  };
  input.click();
}

// === RENDER ===
function render() {
  const main = document.getElementById('mainContent');
  const toolbar = document.getElementById('toolbar');
  const statusText = document.getElementById('statusText');
  const modeLabel = document.getElementById('modeLabel');
  const statusDot = document.getElementById('statusDot');

  statusText.textContent = `DECK: ${state.deck.length} GIFS`;
  modeLabel.textContent = `${state.mode.toUpperCase()} MODE`;

  document.querySelectorAll('.mode-pill').forEach(el => {
    el.classList.remove('active','remote-active');
    if (el.dataset.mode === state.mode) {
      el.classList.add(state.mode === 'ctrl' || state.mode === 'show' ? 'remote-active' : 'active');
    }
  });

  if (state.mode === 'show') {
    statusDot.classList.remove('offline');
    startPolling();
  } else {
    stopPolling();
  }

  if (state.mode === 'prep') renderPrep(main, toolbar);
  else if (state.mode === 'live') renderLive(main, toolbar);
  else if (state.mode === 'show') renderShow(main, toolbar);
  else if (state.mode === 'ctrl') renderCtrl(main, toolbar);
}

function renderPrep(main, toolbar) {
  const filtered = state.activeCat === 'all' ? state.deck : state.deck.filter(g => g.category === state.activeCat);
  main.innerHTML = `
    <div class="search-wrap">
      <span class="search-icon">&#x1F50D;</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Search Giphy..." autocomplete="off" autocapitalize="off">
    </div>
    <div id="searchResults" class="search-results" style="margin-bottom:16px"></div>
    <div class="cat-tabs">${CATEGORIES.map(c=>`<button class="cat-tab ${c===state.activeCat?'active':''}" data-cat="${c}">${c}</button>`).join('')}</div>
    ${filtered.length ? `<div class="deck-grid">${filtered.map(g=>`
      <div class="deck-card fade-in" data-id="${g.id}">
        <img src="${g.base64||g.url}" alt="${g.label}" loading="lazy">
        <div class="card-label">${g.label}</div>
        <button class="card-delete" data-del="${g.id}">&times;</button>
      </div>
    `).join('')}</div>` : `
      <div class="empty">
        <div class="empty-icon">&#x1F3AC;</div>
        <div class="empty-title">No GIFs Yet</div>
        <div class="empty-sub">Search Giphy above to find reaction GIFs and add them to your deck</div>
      </div>
    `}
  `;
  toolbar.innerHTML = `
    <button class="tool-btn" onclick="exportDeck()">&#x2B07; Export</button>
    <button class="tool-btn" onclick="importDeck()">&#x2B06; Import</button>
    <button class="tool-btn primary" onclick="document.getElementById('searchInput').focus()">&#x1F50D; Search</button>
  `;

  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => searchGiphy(e.target.value), 400);
  });

  main.querySelectorAll('.cat-tab').forEach(el => {
    el.onclick = () => { state.activeCat = el.dataset.cat; render(); };
  });
  main.querySelectorAll('.deck-card').forEach(el => {
    el.onclick = (e) => {
      if (e.target.closest('.card-delete')) { removeFromDeck(e.target.closest('.card-delete').dataset.del); return; }
      const gif = state.deck.find(g => g.id === el.dataset.id);
      if (gif) showFullscreen(gif.base64 || gif.url);
    };
  });

  renderSearchResults();
}

function renderSearchResults() {
  const container = document.getElementById('searchResults');
  if (!container) return;
  if (state.searching) {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3);font-family:var(--font-mono);font-size:11px;letter-spacing:.08em">SEARCHING...</div>';
    return;
  }
  container.innerHTML = state.searchResults.map(g => `
    <div class="search-result" data-gid="${g.id}">
      <img src="${g.preview}" alt="${g.title}" loading="lazy">
      <div class="add-badge">+</div>
    </div>
  `).join('');
  container.querySelectorAll('.search-result').forEach(el => {
    el.onclick = () => {
      const gif = state.searchResults.find(g => g.id === el.dataset.gid);
      if (gif) showAddModal(gif);
    };
  });
}

function renderLive(main, toolbar) {
  const filtered = state.activeCat === 'all' ? state.deck : state.deck.filter(g => g.category === state.activeCat);
  main.innerHTML = `
    <div class="cat-tabs">${CATEGORIES.map(c=>`<button class="cat-tab ${c===state.activeCat?'active':''}" data-cat="${c}">${c}</button>`).join('')}</div>
    ${filtered.length ? `<div class="deck-grid">${filtered.map(g=>`
      <div class="deck-card fade-in" data-id="${g.id}">
        <img src="${g.base64||g.url}" alt="${g.label}" loading="lazy">
        <div class="card-label">${g.label}</div>
      </div>
    `).join('')}</div>` : `<div class="empty"><div class="empty-icon">&#x1F4AD;</div><div class="empty-title">Deck Empty</div><div class="empty-sub">Switch to PREP to add GIFs</div></div>`}
  `;
  toolbar.innerHTML = '';
  main.querySelectorAll('.cat-tab').forEach(el => {
    el.onclick = () => { state.activeCat = el.dataset.cat; render(); };
  });
  main.querySelectorAll('.deck-card').forEach(el => {
    el.onclick = () => {
      const gif = state.deck.find(g => g.id === el.dataset.id);
      if (gif) showFullscreen(gif.base64 || gif.url);
    };
  });
}

function renderShow(main, toolbar) {
  main.innerHTML = `
    <div class="empty">
      <div class="empty-icon">&#x1F4FA;</div>
      <div class="empty-title">Display Mode</div>
      <div class="empty-sub">Waiting for commands from CTRL device...<br><br>
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--remote)">POLLING EVERY ${POLL_MS}MS</span></div>
    </div>
  `;
  toolbar.innerHTML = `<button class="tool-btn" onclick="testConnection()">&#x1F4E1; Test Connection</button>`;
}

function renderCtrl(main, toolbar) {
  const filtered = state.activeCat === 'all' ? state.deck : state.deck.filter(g => g.category === state.activeCat);
  main.innerHTML = `
    <div class="cat-tabs">${CATEGORIES.map(c=>`<button class="cat-tab ${c===state.activeCat?'active':''}" data-cat="${c}">${c}</button>`).join('')}</div>
    ${filtered.length ? `<div class="ctrl-grid">${filtered.map(g=>`
      <div class="ctrl-card fade-in" data-id="${g.id}">
        <img src="${g.base64||g.url}" alt="${g.label}" loading="lazy">
        <div class="card-label">${g.label}</div>
      </div>
    `).join('')}</div>` : `<div class="empty"><div class="empty-icon">&#x1F3AE;</div><div class="empty-title">No GIFs</div><div class="empty-sub">Add GIFs in PREP mode first</div></div>`}
  `;
  toolbar.innerHTML = '';
  main.insertAdjacentHTML('beforeend', '<button class="ctrl-clear" id="ctrlClear">&#x2716; CLEAR DISPLAY</button>');

  main.querySelectorAll('.cat-tab').forEach(el => {
    el.onclick = () => { state.activeCat = el.dataset.cat; render(); };
  });
  main.querySelectorAll('.ctrl-card').forEach(el => {
    el.onclick = () => {
      sendCmd({action:'show', gifId: el.dataset.id});
      el.classList.add('sent');
      setTimeout(() => el.classList.remove('sent'), 800);
      toast('Sent to display');
    };
  });
  document.getElementById('ctrlClear').onclick = () => { sendCmd({action:'clear'}); toast('Display cleared'); };
}

function testConnection() {
  sendCmd({action:'test', ts: Date.now()});
  toast('Test signal sent');
}

// === MODE SWITCHING ===
document.querySelectorAll('.mode-pill').forEach(el => {
  el.onclick = () => { state.mode = el.dataset.mode; render(); };
});

// === FULLSCREEN EVENTS ===
document.getElementById('fullscreenClose').onclick = hideFullscreen;
document.getElementById('fullscreen').onclick = (e) => {
  if (e.target === e.currentTarget) hideFullscreen();
};
document.getElementById('modalOverlay').onclick = (e) => {
  if (e.target === e.currentTarget) e.target.classList.remove('show');
};

// === INIT ===
loadDeck();
render();
</script>
</body>
</html>
